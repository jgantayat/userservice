spring:
  application:
    name: userservice
  datasource:
    url: jdbc:mysql://localhost:3306/USER?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: Root@User
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      ddl-auto: create
    show-sql: true
  sql:
    init:
      mode: never
server:
  port: 8080